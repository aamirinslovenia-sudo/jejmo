<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JEJMO PRO | DRIVER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #a855f7; --bg: #060a11; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Outfit', sans-serif; background: var(--bg); color: white; -webkit-tap-highlight-color: transparent; }
        .logo-glow { position: absolute; width: 150px; height: 150px; background: radial-gradient(circle, rgba(168, 85, 247, 0.4) 0%, rgba(168, 85, 247, 0) 70%); filter: blur(25px); z-index: 0; }
        .logo-main { height: 120px; width: 120px; object-fit: cover; border-radius: 50%; border: 2px solid rgba(255, 255, 255, 0.1); z-index: 1; position: relative; }
        .logo-sidebar { height: 60px; width: 60px; object-fit: cover; border-radius: 50%; border: 1px solid rgba(255, 255, 255, 0.1); }
        .bottom-sheet { position: fixed; bottom: 30px; left: 12px; right: 12px; z-index: 100; transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1); padding-bottom: env(safe-area-inset-bottom); max-height: 85vh; overflow-y: auto; }
        .sheet-minimized { transform: translateY(calc(100% - 160px)); }
        .sheet-expanded { transform: translateY(0); }
        .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 32px; }
        #history-sidebar, #chat-overlay, #stats-overlay { position: fixed; top: 0; right: 0; width: 100%; height: 100%; background: #060a11; z-index: 2000; transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 70px 25px; display: flex; flex-direction: column; }
        .sidebar-active, .chat-active, .stats-active { transform: translateX(0) !important; }
        .status-online { background: #10b981; box-shadow: 0 0 15px #10b981; }
        .status-offline { background: #ef4444; box-shadow: 0 0 15px #ef4444; }
        .tab-btn { padding: 10px 18px; border-radius: 14px; font-weight: 700; font-size: 13px; color: #64748b; border: 1px solid transparent; }
        .tab-btn.active { background: rgba(168, 85, 247, 0.1); color: var(--accent); border-color: rgba(168, 85, 247, 0.3); }
        .radar-ring { border: 2px solid rgba(168, 85, 247, 0.2); border-radius: 50%; position: absolute; animation: radar 3s infinite ease-out; pointer-events: none; }
        @keyframes radar { from { width: 50px; height: 50px; opacity: 1; } to { width: 180px; height: 180px; opacity: 0; } }
        .msg-driver { align-self: flex-end; background: var(--accent); padding: 12px 18px; border-radius: 20px 20px 4px 20px; font-size: 14px; max-width: 80%; margin-bottom: 10px; color: white; }
        .msg-admin { align-self: flex-start; background: rgba(255,255,255,0.1); padding: 12px 18px; border-radius: 20px 20px 20px 4px; font-size: 14px; max-width: 80%; margin-bottom: 10px; }
        .cash-alert { background: rgba(234, 179, 8, 0.1); border: 1px solid rgba(234, 179, 8, 0.2); border-radius: 20px; padding: 15px; margin-bottom: 20px; }
        .instruction-alert { background: rgba(168, 85, 247, 0.1); border: 1px solid rgba(168, 85, 247, 0.3); border-radius: 20px; padding: 14px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="fixed top-[60px] left-0 w-full z-[150] px-6 flex justify-between items-center">
        <button onclick="toggleSidebar()" class="w-14 h-14 glass-panel flex items-center justify-center text-2xl active:scale-90 transition-all">≡</button>
        <div class="glass-panel px-5 py-3 flex items-center gap-3">
            <span id="conn-dot" class="w-2.5 h-2.5 rounded-full status-online"></span>
            <span id="conn-text" class="text-[10px] font-black uppercase tracking-widest">Active Duty</span>
        </div>
    </div>

    <div id="stats-overlay">
        <div class="flex items-center gap-6 mb-10">
            <button onclick="closeStats()" class="text-2xl font-bold">←</button>
            <h2 class="text-3xl font-black italic tracking-tighter text-white uppercase">Your <span class="text-purple-500">Earnings</span></h2>
        </div>
        <div class="flex justify-between glass-panel p-1 mb-10">
            <button onclick="filterStats('today')" id="tab-today" class="tab-btn active flex-1">Today</button>
            <button onclick="filterStats('week')" id="tab-week" class="tab-btn flex-1">Week</button>
            <button onclick="filterStats('month')" id="tab-month" class="tab-btn flex-1">Month</button>
        </div>
        <div class="space-y-1">
            <div class="flex justify-between py-6 border-b border-white/5"><span class="text-slate-400 font-bold uppercase text-xs">Missions</span><span id="stat-count" class="font-black text-xl">0</span></div>
            <div class="flex justify-between py-6 border-b border-white/5"><span class="text-slate-400 font-bold uppercase text-xs">Payout</span><span id="stat-total" class="font-black text-xl text-purple-400">€0.00</span></div>
        </div>
    </div>

    <div id="history-sidebar">
        <div class="flex justify-between items-center mb-12">
            <img src="logo.jpg" alt="Logo" class="logo-sidebar">
            <button onclick="toggleSidebar()" class="w-12 h-12 glass-panel flex items-center justify-center">✕</button>
        </div>
        <div class="space-y-4">
            <button onclick="openStats()" class="w-full flex items-center gap-5 p-6 glass-panel text-left active:scale-95 transition-all">
                <span class="text-2xl">📊</span><div><p class="font-bold text-lg text-white">Dashboard</p><p class="text-[10px] text-slate-500 uppercase">View Income</p></div>
            </button>
            <button onclick="openChat()" class="w-full flex items-center gap-5 p-6 glass-panel text-left active:scale-95 transition-all">
                <span class="text-2xl">🎧</span><div><p class="font-bold text-lg text-white">Dispatcher</p><p class="text-[10px] text-slate-500 uppercase">Live Support</p></div>
            </button>
        </div>
        <div class="mt-auto p-6 border-t border-white/10 text-center">
            <p id="display-driver-id" class="text-xs font-mono text-purple-400">---</p>
        </div>
    </div>

    <div id="boot-screen" class="fixed inset-0 z-[3000] bg-[#060a11] flex flex-col items-center justify-center p-12 text-center">
        <div class="relative flex items-center justify-center mb-16">
            <div class="logo-glow"></div>
            <img src="logo.jpg" alt="Logo" class="logo-main">
        </div>
        <button onclick="goOnline()" class="bg-white text-black w-full py-7 rounded-[35px] text-lg font-black uppercase tracking-widest shadow-2xl active:scale-95 transition-all">Go Online</button>
    </div>

    <div id="order-sheet" class="bottom-sheet glass-panel sheet-minimized">
        <div id="order-content" class="px-8 pt-4 pb-10">
            <div class="w-16 h-1 bg-white/10 rounded-full mx-auto mb-10"></div>
            
            <div id="waiting-ui" class="text-center py-6 relative flex flex-col items-center justify-center">
                <div class="radar-ring"></div>
                <div class="radar-ring" style="animation-delay: 1.5s"></div>
                <h3 class="text-xl font-black uppercase italic tracking-tighter text-white">Searching...</h3>
                <p class="text-slate-500 font-bold text-[10px] uppercase tracking-[0.3em] mt-1">Available for Missions</p>
            </div>

            <div id="order-ui" class="hidden">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <p id="display-order-number" class="text-purple-500 font-black text-2xl italic tracking-tighter mb-1">#---</p>
                        <div id="display-price" class="text-6xl font-black tracking-tighter text-white">€0.00</div>
                    </div>
                    <button onclick="confirmDecline()" class="bg-red-500/20 text-red-500 px-4 py-2 rounded-xl text-[10px] font-black uppercase">Skip</button>
                </div>

                <div id="display-items" class="bg-white/5 border border-white/5 rounded-2xl p-4 mb-4 text-sm text-slate-300 italic">
                    ---
                </div>

                <div id="instruction-ui" class="instruction-alert mb-4">
                    <div class="flex items-start gap-3">
                        <span class="text-purple-500 text-lg">📝</span>
                        <div>
                            <p class="text-[9px] font-black text-purple-400 uppercase tracking-widest">Customer Note</p>
                            <p id="display-instruction" class="text-sm font-bold text-white leading-tight mt-0.5">---</p>
                        </div>
                    </div>
                </div>

                <div id="cash-collection-ui" class="hidden cash-alert mb-6">
                    <label class="flex items-center gap-4">
                        <input type="checkbox" id="cash-collected-check" onchange="toggleFinishButton()" class="w-5 h-5 accent-purple-500">
                        <div>
                            <p class="text-[10px] font-black text-yellow-500 uppercase tracking-widest">Collect Cash</p>
                            <p class="text-sm font-bold text-white"><span id="cash-amount" class="text-yellow-500">€0.00</span> from client</p>
                        </div>
                    </label>
                </div>

                <div class="space-y-6 mb-10">
                    <div class="flex gap-4">
                        <div class="w-10 h-10 glass-panel flex items-center justify-center font-black text-purple-500">A</div>
                        <div class="flex-1">
                            <p class="text-[9px] text-slate-500 uppercase font-bold tracking-widest">Pickup</p>
                            <h4 id="display-res-name" class="text-lg font-bold text-white leading-tight">---</h4>
                            <a id="display-res-addr" href="#" target="_blank" class="text-purple-400 text-sm font-bold underline truncate block">---</a>
                        </div>
                        <a id="res-phone" href="#" class="w-10 h-10 glass-panel flex items-center justify-center text-sm">📞</a>
                    </div>
                    <div class="flex gap-4">
                        <div class="w-10 h-10 bg-purple-600 rounded-xl flex items-center justify-center font-black text-white">B</div>
                        <div class="flex-1">
                            <p class="text-[9px] text-slate-500 uppercase font-bold tracking-widest">Dropoff</p>
                            <h4 id="c-name" class="text-lg font-bold truncate text-white leading-tight">---</h4>
                            <p id="c-addr" class="text-purple-400 text-sm font-bold underline truncate">---</p>
                        </div>
                    </div>
                </div>
                <div class="flex gap-4">
                    <a id="c-phone" href="#" class="w-20 h-20 glass-panel flex items-center justify-center text-2xl">📞</a>
                    <button id="action-btn" onclick="processOrder()" class="flex-1 bg-purple-600 text-white rounded-[24px] font-black uppercase text-lg tracking-widest active:scale-95 transition-all">Accept</button>
                </div>
            </div>
        </div>
    </div>

    <div id="chat-overlay">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-black italic text-purple-500">DISPATCH</h2>
            <button onclick="closeChat()" class="text-2xl">✕</button>
        </div>
        <div id="chat-messages" class="flex-1 space-y-4 mb-6 overflow-y-auto flex flex-col"></div>
        <div class="flex gap-3">
            <input type="text" id="chat-input" placeholder="Message..." class="flex-1 glass-panel p-5 outline-none text-white">
            <button onclick="sendMessage()" class="w-16 h-16 bg-purple-600 rounded-full flex items-center justify-center font-bold">➤</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyBD_YmzFTA2OKn64h22Z9yM7pCAmmlTl68", 
            authDomain: "jejmo-maribor.firebaseapp.com", 
            databaseURL: "https://jejmo-maribor-default-rtdb.europe-west1.firebasedatabase.app", 
            projectId: "jejmo-maribor", 
            storageBucket: "jejmo-maribor.firebasestorage.app", 
            messagingSenderId: "87105321281", 
            appId: "1:87105321281:web:ec83e4472e5756182749c0" 
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let driverId = localStorage.getItem('jejmo_driver_id');
        if (!driverId) { driverId = "DRV-" + Math.floor(1000 + Math.random() * 9000); localStorage.setItem('jejmo_driver_id', driverId); }
        document.getElementById('display-driver-id').innerText = driverId;

        let currentOrder = null; let audioCtx = null; let alertInterval = null;
        let allCompletedOrders = [];

        db.ref(".info/connected").on("value", (snap) => {
            const dot = document.getElementById('conn-dot');
            dot.className = snap.val() === true ? "w-2.5 h-2.5 rounded-full status-online" : "w-2.5 h-2.5 rounded-full status-offline";
        });

        function goOnline() { 
            audioCtx = new (window.AudioContext || window.webkitAudioContext)(); 
            document.getElementById('boot-screen').style.display = 'none'; 
        }

        db.ref('orders').on('value', (snap) => {
            let activeTask = null; let availableOrder = null; allCompletedOrders = [];
            snap.forEach(c => {
                const o = c.val(); o.id = c.key;
                if (o.status === "Delivering" && o.claimedBy === driverId) activeTask = o;
                if (o.status === "Ready" && !o.claimedBy) availableOrder = o;
                if (o.status === "Completed") allCompletedOrders.push(o);
            });

            if (activeTask) {
                currentOrder = activeTask; renderUI(activeTask, "End Mission");
                clearInterval(alertInterval); alertInterval = null;
            } else if (availableOrder) {
                currentOrder = availableOrder; renderUI(availableOrder, "Accept Mission");
                if (!alertInterval) { playBeep(); alertInterval = setInterval(playBeep, 2500); }
            } else {
                currentOrder = null; clearInterval(alertInterval); alertInterval = null;
                document.getElementById('order-ui').classList.add('hidden');
                document.getElementById('waiting-ui').classList.remove('hidden');
                document.getElementById('order-sheet').classList.replace('sheet-expanded', 'sheet-minimized');
            }
        });

        function renderUI(o, btnText) {
            // Customer Details (Dropoff)
            document.getElementById('c-name').innerText = o.customer;
            document.getElementById('c-addr').innerText = o.address;
            document.getElementById('c-phone').href = "tel:" + o.phone;
            
            // Order details
            document.getElementById('display-price').innerText = o.totalPrice;
            document.getElementById('display-order-number').innerText = o.orderNumber ? "#" + o.orderNumber : "#" + o.id.substring(0,5).toUpperCase();
            document.getElementById('display-items').innerText = o.item || "Standard Order";
            document.getElementById('display-instruction').innerText = o.courierInstruction || "No special instructions";

            // UPDATED: Pickup Details (Dynamic from Restaurant Side)
            const rName = o.restaurant || "Master Kitchen";
            const rAddr = o.restaurantAddress || "Add Address in Settings";
            const rPhone = o.restaurantPhone || "";

            document.getElementById('display-res-name').innerText = rName;
            document.getElementById('display-res-addr').innerText = rAddr;
            document.getElementById('display-res-addr').href = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(rAddr)}`;
            document.getElementById('res-phone').href = "tel:" + rPhone;

            // UI State
            document.getElementById('action-btn').innerText = btnText;
            document.getElementById('order-ui').classList.remove('hidden');
            document.getElementById('waiting-ui').classList.add('hidden');
            document.getElementById('order-sheet').classList.replace('sheet-minimized', 'sheet-expanded');

            const cashUI = document.getElementById('cash-collection-ui');
            if (o.status === "Delivering" && o.paymentType === "Cash") {
                cashUI.classList.remove('hidden');
                document.getElementById('cash-amount').innerText = o.totalPrice;
                toggleFinishButton();
            } else {
                cashUI.classList.add('hidden');
                document.getElementById('action-btn').disabled = false;
                document.getElementById('action-btn').style.opacity = "1";
            }
        }

        function toggleFinishButton() {
            const check = document.getElementById('cash-collected-check');
            const btn = document.getElementById('action-btn');
            if (currentOrder && currentOrder.status === "Delivering" && currentOrder.paymentType === "Cash") {
                if (check.checked) {
                    btn.disabled = false; btn.style.opacity = "1"; btn.innerText = "End Mission";
                } else {
                    btn.disabled = true; btn.style.opacity = "0.3"; btn.innerText = "Collect Cash First";
                }
            }
        }

        function processOrder() { 
            if (!currentOrder) return; 
            if (currentOrder.status === "Ready") {
                db.ref('orders/' + currentOrder.id).update({ status: "Delivering", claimedBy: driverId });
                // Open Customer Dropoff Map
                window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(currentOrder.address)}`, '_blank');
            } else {
                db.ref('orders/' + currentOrder.id).update({status: "Completed", completedAt: Date.now()});
            }
        }

        function playBeep() {
            if (!audioCtx) return;
            const t = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(1000, t);
            gain.gain.setValueAtTime(0.1, t);
            gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
            osc.start(t); osc.stop(t + 0.2);
        }

        function toggleSidebar() { document.getElementById('history-sidebar').classList.toggle('sidebar-active'); }
        function openStats() { document.getElementById('stats-overlay').classList.add('stats-active'); toggleSidebar(); filterStats('today'); }
        function closeStats() { document.getElementById('stats-overlay').classList.remove('stats-active'); }
        function openChat() { document.getElementById('chat-overlay').classList.add('chat-active'); toggleSidebar(); }
        function closeChat() { document.getElementById('chat-overlay').classList.remove('chat-active'); }
        function confirmDecline() { if(confirm("Decline mission?")) location.reload(); }

        function filterStats(range) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + range).classList.add('active');
            let count = 0; const now = new Date();
            allCompletedOrders.forEach(o => {
                if (o.claimedBy === driverId) {
                    const oDate = new Date(o.completedAt || o.timestamp);
                    if(range === 'today' && oDate.toDateString() === now.toDateString()) count++;
                    else if(range === 'week' && (now - oDate) < 7 * 24 * 60 * 60 * 1000) count++;
                    else if(range === 'month' && oDate.getMonth() === now.getMonth()) count++;
                }
            });
            document.getElementById('stat-count').innerText = count;
            document.getElementById('stat-total').innerText = "€" + (count * 4).toFixed(2);
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            if (!input.value.trim()) return;
            db.ref('support_tickets/' + driverId).update({ customer: driverId, lastUpdate: Date.now(), status: "Open" });
            db.ref('support_tickets/' + driverId + '/chat').push({ sender: "Driver", text: input.value, timestamp: Date.now() });
            input.value = "";
        }

        db.ref('support_tickets/' + driverId).on('value', (snap) => {
            const t = snap.val(); const chatBox = document.getElementById('chat-messages');
            if (t && t.chat) {
                chatBox.innerHTML = Object.values(t.chat).map(m => `<div class="${m.sender === 'Driver' ? 'msg-driver' : 'msg-admin'}">${m.text}</div>`).join('');
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        });
    </script>
</body>
</html>
