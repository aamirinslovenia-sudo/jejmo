<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JEJMO | COURIER HQ</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        body { background: #060a11; color: white; font-family: 'Outfit', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(10px); }
        .purple-glow { box-shadow: 0 0 20px rgba(168, 85, 247, 0.15); }
        .msg-bubble { max-width: 80%; padding: 10px 14px; border-radius: 18px; font-size: 13px; margin-bottom: 8px; }
        .scroll-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 pb-24">

    <div class="flex justify-between items-center mb-8 pt-2">
        <img src="logo.jpg" class="w-12 h-12 rounded-full border-2 border-purple-500/30 object-cover">
        <div class="text-right">
            <p class="text-[10px] text-purple-500 font-black uppercase tracking-widest">Courier Status</p>
            <p id="display-id" class="font-mono font-black text-white text-lg leading-tight uppercase tracking-tighter">Connecting...</p>
        </div>
    </div>

    <h3 class="text-xs font-black uppercase text-slate-500 mb-4 tracking-widest">Active Missions</h3>
    <div id="order-container" class="space-y-4">
        <div class="text-center py-10 opacity-30 text-xs uppercase tracking-widest">Scanning for orders...</div>
    </div>

    <div id="support-modal" class="fixed inset-0 bg-black/90 z-50 hidden flex flex-col p-6">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-black italic uppercase">HQ Support</h2>
            <button onclick="toggleSupport()" class="text-slate-500 font-bold">CLOSE</button>
        </div>
        <div id="chat-box" class="flex-1 overflow-y-auto scroll-hide space-y-3 mb-4 flex flex-col"></div>
        <div class="flex gap-2 glass p-2 rounded-2xl border-white/10">
            <input type="text" id="chat-input" class="flex-1 bg-transparent p-3 text-sm outline-none" placeholder="Message Dispatcher...">
            <button onclick="sendMsg()" class="bg-purple-600 px-6 rounded-xl font-black">SEND</button>
        </div>
    </div>

    <div class="fixed bottom-6 left-4 right-4 h-16 glass rounded-2xl flex items-center justify-around border-white/10 purple-glow">
        <button class="flex flex-col items-center opacity-100"><span class="text-[10px] font-black uppercase tracking-widest text-purple-400">Orders</span></button>
        <button onclick="toggleSupport()" class="flex flex-col items-center opacity-50"><span class="text-[10px] font-black uppercase tracking-widest">Support</span></button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIza...",
            authDomain: "jejmo-maribor.firebaseapp.com",
            databaseURL: "https://jejmo-maribor-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "jejmo-maribor",
            storageBucket: "jejmo-maribor.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. Generate/Load Driver ID
        let driverId = localStorage.getItem('jejmo_drv_id');
        if(!driverId) {
            driverId = 'DRV-' + Math.floor(1000 + Math.random() * 9000);
            localStorage.setItem('jejmo_drv_id', driverId);
        }
        document.getElementById('display-id').innerText = driverId;

        // 2. Listen for Orders
        db.ref('orders').on('value', snap => {
            const container = document.getElementById('order-container');
            container.innerHTML = "";
            let count = 0;
            snap.forEach(child => {
                const o = child.val();
                if(o.status === "New" || (o.status === "On Way" && o.claimedBy === driverId)) {
                    count++;
                    const isClaimed = o.status === "On Way";
                    container.innerHTML += `
                        <div class="glass p-6 rounded-[32px] border-l-4 ${isClaimed ? 'border-purple-500' : 'border-slate-700'}">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <h2 class="text-xl font-black text-white leading-tight">${o.item}</h2>
                                    <p class="text-xs text-slate-400 font-bold uppercase tracking-wider">${o.customer}</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-lg font-black text-white">${o.totalPrice}</p>
                                </div>
                            </div>
                            <button onclick="updateOrder('${child.key}', '${o.status}')" class="w-full py-4 ${isClaimed ? 'bg-green-600' : 'bg-purple-600'} rounded-2xl font-black uppercase text-[11px] tracking-widest active:scale-95 transition-all">
                                ${isClaimed ? 'Confirm Delivery' : 'Claim Mission'}
                            </button>
                        </div>`;
                }
            });
            if(count === 0) container.innerHTML = '<div class="text-center py-20 opacity-20 text-[10px] font-black uppercase tracking-widest italic">All Quiet in Maribor</div>';
        });

        function updateOrder(key, status) {
            const next = status === "New" ? "On Way" : "Completed";
            db.ref('orders/' + key).update({ status: next, claimedBy: driverId });
        }

        // 3. Support Logic
        function toggleSupport() { 
            const m = document.getElementById('support-modal');
            m.classList.toggle('hidden');
            if(!m.classList.contains('hidden')) {
                db.ref('support_tickets/' + driverId).update({ status: "Open", lastUpdate: Date.now() });
            }
        }

        db.ref('support_tickets/' + driverId + '/chat').on('value', snap => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            snap.forEach(child => {
                const m = child.val();
                const isAdmin = m.sender === "Admin";
                box.innerHTML += `<div class="flex ${isAdmin ? 'justify-start' : 'justify-end'}"><div class="msg-bubble ${isAdmin ? 'bg-white/10 text-white' : 'bg-purple-600 text-white'}">${m.text}</div></div>`;
            });
            box.scrollTop = box.scrollHeight;
        });

        function sendMsg() {
            const input = document.getElementById('chat-input');
            if(!input.value) return;
            db.ref('support_tickets/' + driverId + '/chat').push({ sender: driverId, text: input.value, timestamp: Date.now() });
            input.value = "";
        }
    </script>
</body>
</html>
