<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JEJMO | COURIER PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #a855f7; --bg: #000000; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Outfit', sans-serif; background: var(--bg); color: white; -webkit-tap-highlight-color: transparent; }
        .bottom-sheet { position: fixed; bottom: 30px; left: 12px; right: 12px; z-index: 100; transition: all 0.6s; padding-bottom: env(safe-area-inset-bottom); }
        .sheet-minimized { transform: translateY(calc(100% - 160px)); }
        .sheet-expanded { transform: translateY(0); }
        .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 32px; }
        #history-sidebar, #chat-overlay, #stats-overlay { position: fixed; top: 0; right: 0; width: 100%; height: 100%; background: #000000; z-index: 2000; transform: translateX(100%); transition: 0.4s; padding: 70px 25px; }
        .sidebar-active, .chat-active, .stats-active { transform: translateX(0) !important; }
        .status-online { background: #10b981; box-shadow: 0 0 15px #10b981; }
        .radar-ring { border: 2px solid rgba(168, 85, 247, 0.2); border-radius: 50%; position: absolute; animation: radar 3s infinite ease-out; pointer-events: none; }
        @keyframes radar { from { width: 50px; height: 50px; opacity: 1; } to { width: 180px; height: 180px; opacity: 0; } }
        .logo-main { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--accent); }
    </style>
</head>
<body>
    <div class="fixed top-[60px] left-0 w-full z-[150] px-6 flex justify-between items-center">
        <button onclick="toggleSidebar()" class="w-14 h-14 glass-panel flex items-center justify-center text-2xl">≡</button>
        <div class="glass-panel px-5 py-3 flex items-center gap-3"><span class="w-2.5 h-2.5 rounded-full status-online"></span><span class="text-[10px] font-black uppercase tracking-widest text-purple-400">Live Shift</span></div>
    </div>

    <div id="boot-screen" class="fixed inset-0 z-[3000] bg-black flex flex-col items-center justify-center p-12 text-center">
        <img src="logo.jpg" class="logo-main mb-12"><button onclick="goOnline()" class="bg-purple-600 text-white w-full py-7 rounded-[35px] text-lg font-black uppercase tracking-widest active:scale-95 transition-all">Start Shift</button>
    </div>

    <div id="order-sheet" class="bottom-sheet glass-panel sheet-minimized">
        <div id="order-content" class="px-8 pt-4 pb-10">
            <div class="w-16 h-1 bg-white/10 rounded-full mx-auto mb-10"></div>
            <div id="waiting-ui" class="text-center py-6 relative flex flex-col items-center justify-center"><div class="radar-ring"></div><div class="radar-ring" style="animation-delay: 1.5s"></div><h3 class="text-xl font-black uppercase italic text-white">Ready for Orders</h3><p class="text-slate-500 font-bold text-[10px] uppercase mt-1">Scanning Maribor</p></div>
            <div id="order-ui" class="hidden">
                <div class="flex justify-between items-start mb-6"><div><p class="text-purple-500 font-black text-[10px] uppercase mb-1">Income</p><div id="display-price" class="text-6xl font-black text-white">€0.00</div></div><button onclick="location.reload()" class="bg-red-500/20 text-red-500 px-4 py-2 rounded-xl text-[10px] font-black uppercase">Skip</button></div>
                <div class="space-y-6 mb-10">
                    <div class="flex gap-4"><div class="w-10 h-10 glass-panel flex items-center justify-center font-black">A</div><div><p class="text-[9px] text-slate-500 uppercase font-bold">Kitchen</p><h4 class="text-lg font-bold" id="res-name">Ready for Pickup</h4></div></div>
                    <div class="flex gap-4"><div class="w-10 h-10 bg-purple-600 rounded-xl flex items-center justify-center font-black">B</div><div><p class="text-[9px] text-slate-500 uppercase font-bold">Customer</p><h4 id="c-name" class="text-lg font-bold truncate">---</h4><p id="c-addr" class="text-purple-400 text-sm font-bold underline truncate">---</p></div></div>
                </div>
                <div class="flex gap-4"><a id="c-phone" href="#" class="w-20 h-20 glass-panel flex items-center justify-center text-2xl">📞</a><button id="action-btn" onclick="processOrder()" class="flex-1 bg-purple-600 text-white rounded-[24px] font-black uppercase text-lg active:scale-95 transition-all">Accept</button></div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBD_YmzFTA2OKn64h22Z9yM7pCAmmlTl68", authDomain: "we-kleo.firebaseapp.com", databaseURL: "https://we-kleo-default-rtdb.europe-west1.firebasedatabase.app", projectId: "we-kleo", storageBucket: "we-kleo.firebasestorage.app", messagingSenderId: "87105321281", appId: "1:87105321281:web:ec83e4472e5756182749c0" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const fs = firebase.firestore();

        let driverId = localStorage.getItem('jejmo_driver_id') || "DRV-" + Math.floor(1000 + Math.random() * 9000);
        localStorage.setItem('jejmo_driver_id', driverId);
        let currentOrder = null; let audioCtx = null; let alertInterval = null;

        function goOnline() { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); document.getElementById('boot-screen').style.display = 'none'; }

        db.ref('orders').on('value', (snap) => {
            let activeTask = null; let availableOrder = null;
            snap.forEach(c => {
                const o = c.val(); o.id = c.key;
                if (o.status === "On Way" && o.claimedBy === driverId) activeTask = o;
                // STRICT FILTER: Only show "Ready" orders
                if (o.status === "Ready" && !o.claimedBy) availableOrder = o;
            });

            if (activeTask) { currentOrder = activeTask; renderUI(activeTask, "End Mission"); clearInterval(alertInterval); alertInterval = null; }
            else if (availableOrder) { currentOrder = availableOrder; renderUI(availableOrder, "Accept"); if (!alertInterval) alertInterval = setInterval(playBeep, 2000); }
            else { currentOrder = null; document.getElementById('order-ui').classList.add('hidden'); document.getElementById('waiting-ui').classList.remove('hidden'); document.getElementById('order-sheet').classList.replace('sheet-expanded', 'sheet-minimized'); }
        });

        function renderUI(o, btnText) {
            document.getElementById('c-name').innerText = o.customer;
            document.getElementById('c-addr').innerText = o.address;
            document.getElementById('display-price').innerText = o.totalPrice;
            document.getElementById('c-phone').href = "tel:" + o.phone;
            document.getElementById('action-btn').innerText = btnText;
            document.getElementById('order-ui').classList.remove('hidden');
            document.getElementById('waiting-ui').classList.add('hidden');
            document.getElementById('order-sheet').classList.replace('sheet-minimized', 'sheet-expanded');
        }

        function processOrder() {
            if (currentOrder.status === "Ready") {
                db.ref('orders/' + currentOrder.id).update({ status: "On Way", claimedBy: driverId });
                window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(currentOrder.address)}`);
            } else {
                db.ref('orders/' + currentOrder.id).update({ status: "Completed", completedAt: Date.now() });
            }
        }

        function playBeep() { if (!audioCtx) return; const t = audioCtx.currentTime; const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.frequency.setValueAtTime(1000, t); g.gain.setValueAtTime(0.1, t); g.gain.exponentialRampToValueAtTime(0.01, t + 0.3); o.start(t); o.stop(t + 0.3); }
        function toggleSidebar() { alert("Driver ID: " + driverId); }
    </script>
</body>
</html>
