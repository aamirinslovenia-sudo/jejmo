<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KITCHEN | TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000000; --card: #0a0a0a; --accent: #a855f7; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: 'Outfit', sans-serif; background-color: var(--bg); color: white; }
        .top-nav { height: 90px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; background: var(--card); }
        .matrix-container { height: calc(100vh - 90px); display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); grid-auto-rows: min-content; gap: 20px; padding: 20px; overflow-y: auto; }
        
        .order-card { background: #111; border-radius: 28px; border: 1px solid rgba(255,255,255,0.08); display: flex; flex-direction: column; padding: 25px; transition: all 0.5s; border-left: 8px solid var(--accent); position: relative; }
        .card-warning { border-left-color: #f59e0b; }
        .card-urgent { border-left-color: #ef4444; animation: urgent-pulse 1.5s infinite; }
        
        @keyframes urgent-pulse { 0%, 100% { background: rgba(239, 68, 68, 0.05); } 50% { background: rgba(239, 68, 68, 0.15); } }
        
        .btn-dispatch { background: var(--accent); color: white; font-weight: 900; text-transform: uppercase; border-radius: 20px; padding: 20px; font-size: 14px; margin-top: 20px; transition: all 0.2s; box-shadow: 0 10px 20px rgba(168, 85, 247, 0.2); cursor: pointer; }
        .btn-dispatch:active { transform: scale(0.95); opacity: 0.8; }
        
        .driver-status-pill { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); padding: 6px 14px; border-radius: 14px; display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 800; }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .dot-green { background: #10b981; }
        .dot-red { background: #ef4444; }
        
        #history-sidebar { position: fixed; top: 0; right: 0; height: 100%; width: 420px; background: #080808; z-index: 2000; transform: translateX(100%); transition: transform 0.4s; border-left: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; }
        .sidebar-open { transform: translateX(0) !important; }
        .logo-small { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; }
        .logo-large { width: 140px; height: 140px; border-radius: 50%; border: 4px solid var(--accent); box-shadow: 0 0 40px rgba(168, 85, 247, 0.3); object-fit: cover; }

        /* Custom item styling for clarity */
        .item-row { border-bottom: 1px solid rgba(255,255,255,0.03); padding-bottom: 8px; margin-bottom: 8px; }
        .item-row:last-child { border: none; }
    </style>
</head>
<body>
    <div id="sync-overlay" class="fixed inset-0 z-[3000] bg-black flex flex-col items-center justify-center text-center p-10">
        <img src="https://raw.githubusercontent.com/aamirinslovenia-sudo/jejmo/main/logo.jpg?t=20260329" class="logo-large mb-10">
        <button onclick="startKitchen()" class="px-16 py-7 bg-purple-600 rounded-[30px] text-white font-black text-xl shadow-2xl uppercase tracking-widest active:scale-95 transition-all">Open Kitchen</button>
    </div>

    <nav class="top-nav">
        <div class="flex items-center gap-8">
            <img src="https://raw.githubusercontent.com/aamirinslovenia-sudo/jejmo/main/logo.jpg?t=20260329" class="logo-small">
            <div id="driver-summary" class="flex gap-3 border-l border-white/10 pl-8"></div>
        </div>
        <div class="flex items-center gap-6">
            <div class="bg-white/5 px-5 py-2 rounded-2xl border border-white/5 text-center">
                <p class="text-[8px] font-black text-slate-500 uppercase tracking-widest">Avg Prep</p>
                <p id="avg-prep" class="text-sm font-bold text-purple-400">--m</p>
            </div>
            <p id="clock" class="text-3xl font-black tabular-nums leading-none tracking-tighter">00:00:00</p>
            <button onclick="toggleHistory()" class="bg-white/5 border border-white/10 px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest">Log</button>
        </div>
    </nav>

    <div id="orderList" class="matrix-container"></div>

    <div id="history-sidebar">
        <div class="p-10 flex justify-between items-center">
            <h2 class="text-2xl font-black italic uppercase text-purple-500">History</h2>
            <button onclick="toggleHistory()" class="text-white text-3xl">✕</button>
        </div>
        <div id="historyList" class="flex-1 overflow-y-auto px-10"></div>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyBD_YmzFTA2OKn64h22Z9yM7pCAmmlTl68", 
            authDomain: "jejmo-maribor.firebaseapp.com", 
            databaseURL: "https://jejmo-maribor-default-rtdb.europe-west1.firebasedatabase.app", 
            projectId: "jejmo-maribor", 
            storageBucket: "jejmo-maribor.firebasestorage.app", 
            messagingSenderId: "87105321281", 
            appId: "1:87105321281:web:ec83e4472e5756182749c0" 
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let audioCtx = null; let alarmInterval = null;

        setInterval(() => { 
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('sl-SI'); 
            updateTimers(); 
        }, 1000);

        function startKitchen() { 
            audioCtx = new (window.AudioContext || window.webkitAudioContext)(); 
            document.getElementById('sync-overlay').style.display = "none"; 
        }

        function playBell() { 
            if (!audioCtx) return; 
            const t = audioCtx.currentTime; 
            [880, 1100].forEach((f, i) => { 
                const o = audioCtx.createOscillator(); 
                const g = audioCtx.createGain(); 
                o.connect(g); g.connect(audioCtx.destination); 
                o.frequency.setValueAtTime(f, t + (i * 0.1)); 
                g.gain.setValueAtTime(0.05, t + (i * 0.1)); 
                g.gain.exponentialRampToValueAtTime(0.001, t + (i * 0.1) + 0.5); 
                o.start(t + (i * 0.1)); o.stop(t + (i * 0.1) + 0.5); 
            }); 
        }

        // Action sound for button taps
        function playTick() {
            if (!audioCtx) return;
            const t = audioCtx.currentTime;
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            o.frequency.setValueAtTime(1500, t);
            g.gain.setValueAtTime(0.02, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
            o.start(t); o.stop(t + 0.1);
        }

        function toggleHistory() { document.getElementById('history-sidebar').classList.toggle('sidebar-open'); }

        db.ref('orders').on('value', (snap) => {
            const list = document.getElementById('orderList');
            const history = document.getElementById('historyList');
            const driverBox = document.getElementById('driver-summary');
            let drivers = {}; let activeOrders = []; let prepTimes = [];
            history.innerHTML = ""; list.innerHTML = "";

            snap.forEach((child) => {
                const o = child.val(); o.id = child.key;
                if(o.claimedBy) {
                    drivers[o.claimedBy] = (o.status === "Delivering") ? "Busy" : "Waiting";
                }
                if (o.status === "New" || o.status === "Preparing") { 
                    activeOrders.push(o); 
                } else { 
                    renderHistory(o.id, o); 
                    if(o.kitchenFinishedAt && o.timestamp) prepTimes.push((o.kitchenFinishedAt - o.timestamp) / 60000); 
                }
            });

            activeOrders.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
            activeOrders.forEach(order => renderOrder(order.id, order));
            
            if(prepTimes.length > 0) document.getElementById('avg-prep').innerText = Math.round(prepTimes.reduce((a,b) => a+b, 0) / prepTimes.length) + "m";
            
            driverBox.innerHTML = Object.keys(drivers).map(dId => `<div class="driver-status-pill"><span class="dot ${drivers[dId] === "Busy" ? 'dot-red' : 'dot-green'}"></span>${dId}</div>`).join('') || '<span class="text-[9px] text-slate-700 font-black uppercase tracking-widest text-left">No Couriers Active</span>';
            
            if (activeOrders.some(o => o.status === "New") && !alarmInterval) {
                alarmInterval = setInterval(playBell, 5000);
                playBell();
            } else if (!activeOrders.some(o => o.status === "New")) {
                clearInterval(alarmInterval); alarmInterval = null;
            }
        });

        function renderOrder(id, o) {
            const time = o.timestamp || Date.now();
            const icon = (o.item.toLowerCase().includes('sour') || o.item.toLowerCase().includes('rain') || o.item.toLowerCase().includes('drink')) ? '🍹' : '🍽️';
            const buttonLabel = o.status === "Preparing" ? "Ready for Pickup" : "Start Preparing";
            const nextStatus = o.status === "Preparing" ? "Ready" : "Preparing";
            const displayOrderNum = o.orderNumber ? "#" + o.orderNumber : "#" + id.substring(0,5).toUpperCase();
            
            // Refined item rendering
            const formattedItems = o.item.split(', ').map(i => `<div class="item-row">${i}</div>`).join('');

            // Driver assignment status
            const driverTag = o.claimedBy ? `<span class="text-[10px] text-green-400 font-black uppercase">Courier: ${o.claimedBy}</span>` : `<span class="text-[10px] text-slate-500 font-black uppercase">Finding Courier...</span>`;

            const html = `
                <div id="card-${id}" data-time="${time}" class="order-card">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-3xl font-black text-purple-500 italic tracking-tighter">${displayOrderNum}</span>
                        <span class="text-xl font-black italic">${o.totalPrice}</span>
                    </div>
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">${o.restaurant || 'JEJMO'}</span>
                        ${driverTag}
                    </div>
                    <h2 class="text-2xl font-black uppercase italic tracking-tighter mb-4 leading-tight flex items-start">
                        <span class="mr-3 mt-1">${icon}</span> 
                        <span class="flex-1">${formattedItems}</span>
                    </h2>
                    <div class="bg-black/40 p-4 rounded-2xl border border-white/5 mb-4 flex-1">
                        <p class="text-[8px] font-black text-slate-600 uppercase mb-1">Customer Note</p>
                        <p class="text-sm italic text-slate-300 leading-tight">${o.notes || 'Paid via ' + (o.paymentType || 'Cash')}</p>
                    </div>
                    <div class="flex justify-between items-end mb-4">
                        <div>
                            <p class="text-[8px] font-black text-slate-600 uppercase mb-1">Kitchen Timer</p>
                            <p id="timer-${id}" class="text-3xl font-black tabular-nums">00:00</p>
                        </div>
                        <div class="text-right">
                            <p class="text-xs font-bold uppercase text-purple-400 mb-1 leading-none">${o.customer}</p>
                        </div>
                    </div>
                    <button onclick="setStatus('${id}', '${nextStatus}')" class="btn-dispatch">${buttonLabel}</button>
                </div>`;
            document.getElementById('orderList').insertAdjacentHTML('beforeend', html);
        }

        function setStatus(id, s) { 
            playTick();
            const updates = { status: s };
            if (s === 'Ready') updates.kitchenFinishedAt = Date.now();
            db.ref('orders/' + id).update(updates); 
        }

        function updateTimers() { 
            document.querySelectorAll('[id^="card-"]').forEach(card => { 
                const id = card.id.replace('card-', ''); 
                const elapsed = Math.floor((Date.now() - parseInt(card.getAttribute('data-time'))) / 1000); 
                const timerEl = document.getElementById(`timer-${id}`); 
                if(timerEl) timerEl.innerText = `${Math.floor(elapsed / 60).toString().padStart(2, '0')}:${(elapsed % 60).toString().padStart(2, '0')}`; 
                
                // Color coding logic
                if (elapsed > 1200) card.className = "order-card card-urgent"; 
                else if (elapsed > 600) card.className = "order-card card-warning"; 
                else card.className = "order-card";
            }); 
        }

        function renderHistory(id, o) { 
            const displayOrderNum = o.orderNumber ? "#" + o.orderNumber : "#" + id.substring(0,5).toUpperCase();
            const html = `
                <div class="bg-white/5 p-6 rounded-3xl border border-white/5 mb-4">
                    <div class="flex justify-between">
                        <p class="font-black italic uppercase text-white text-sm">${displayOrderNum} • ${o.item.substring(0,25)}...</p>
                        <p class="text-purple-400 font-bold">${o.totalPrice}</p>
                    </div>
                    <p class="text-[10px] text-slate-500 font-bold uppercase mt-1">${o.customer} • ${o.status}</p>
                </div>`; 
            document.getElementById('historyList').insertAdjacentHTML('afterbegin', html); 
        }
    </script>
</body>
</html>
