<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEJMO | KITCHEN DISPLAY</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: white; font-family: 'Outfit', sans-serif; overflow: hidden; height: 100vh; }
        .order-card { background: #111; border: 2px solid #222; border-radius: 24px; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .scroll-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-8">

    <div class="flex justify-between items-end mb-12">
        <div>
            <h1 class="text-6xl font-black italic uppercase tracking-tighter">Kitchen</h1>
            <p class="text-purple-500 font-black tracking-[0.3em] uppercase text-xs">Maribor Station v1.0</p>
        </div>
        <img src="logo.jpg" class="w-20 h-20 rounded-full border-4 border-white/5">
    </div>

    <div id="kitchen-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 overflow-y-auto scroll-hide pb-20">
        </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIza...",
            authDomain: "jejmo-maribor.firebaseapp.com",
            databaseURL: "https://jejmo-maribor-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "jejmo-maribor",
            storageBucket: "jejmo-maribor.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('orders').on('value', snap => {
            const grid = document.getElementById('kitchen-grid');
            grid.innerHTML = "";
            let count = 0;

            snap.forEach(child => {
                const o = child.val();
                // Only show orders that are "New" (haven't been claimed yet)
                if(o.status === "New") {
                    count++;
                    grid.innerHTML += `
                        <div class="order-card p-8 flex flex-col justify-between">
                            <div>
                                <div class="flex justify-between items-center mb-6">
                                    <span class="bg-purple-600 text-[10px] font-black px-3 py-1 rounded-full">INCOMING</span>
                                    <span class="text-xs text-white/20 font-mono">${new Date(o.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                                </div>
                                <h2 class="text-3xl font-black leading-tight mb-2">${o.item}</h2>
                                <p class="text-slate-500 font-bold uppercase text-xs tracking-widest">${o.customer}</p>
                            </div>
                            <div class="mt-8 pt-6 border-t border-white/5 flex justify-between items-center">
                                <p class="text-white/40 text-[10px] font-black">AWAITING COURIER</p>
                                <div class="w-3 h-3 rounded-full bg-purple-500 animate-pulse"></div>
                            </div>
                        </div>`;
                }
            });

            if(count === 0) {
                grid.innerHTML = '<div class="col-span-full py-40 text-center opacity-10 text-4xl font-black uppercase italic tracking-tighter">Kitchen Clear</div>';
            }
        });
    </script>
</body>
</html>
