<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JEJMO | KITCHEN COMMAND</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000000; --card: #0a0a0a; --accent: #3b82f6; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: 'Outfit', sans-serif; background-color: var(--bg); color: white; }
        
        .top-nav { height: 90px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; background: var(--card); z-index: 100; position: relative; }
        .matrix-container { height: calc(100vh - 90px); display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); grid-auto-rows: min-content; gap: 24px; padding: 30px; overflow-y: auto; scroll-behavior: smooth; }
        
        .order-card { background: #111; border-radius: 32px; border: 1px solid rgba(255,255,255,0.08); display: flex; flex-direction: column; padding: 28px; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; border-left: 10px solid var(--accent); }
        .order-card:hover { transform: translateY(-5px); border-color: rgba(255,255,255,0.2); }
        
        /* Dynamic Brand Coloring */
        .brand-chimney { border-left-color: #f59e0b; --accent: #f59e0b; }
        .brand-default { border-left-color: #3b82f6; --accent: #3b82f6; }

        .card-warning { border-left-color: #ef4444 !important; }
        .card-urgent { border-left-color: #ef4444 !important; animation: urgent-pulse 1.5s infinite; }
        
        @keyframes urgent-pulse { 0%, 100% { background: rgba(239, 68, 68, 0.05); box-shadow: 0 0 0px rgba(239,68,68,0); } 50% { background: rgba(239, 68, 68, 0.15); box-shadow: 0 0 30px rgba(239,68,68,0.2); } }
        
        .btn-dispatch { background: var(--accent); color: white; font-weight: 900; text-transform: uppercase; border-radius: 22px; padding: 22px; font-size: 15px; margin-top: 20px; transition: all 0.2s; box-shadow: 0 10px 25px rgba(0,0,0,0.4); border: none; cursor: pointer; }
        .btn-ready { background: #10b981; }
        .btn-dispatch:active { transform: scale(0.96); opacity: 0.9; }
        
        #history-sidebar { position: fixed; top: 0; right: 0; height: 100%; width: 450px; background: #080808; z-index: 2000; transform: translateX(100%); transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); border-left: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; box-shadow: -20px 0 50px rgba(0,0,0,0.5); }
        .sidebar-open { transform: translateX(0) !important; }

        .item-row { border-bottom: 1px solid rgba(255,255,255,0.05); padding: 12px 0; font-weight: 700; font-size: 1.1rem; }
        .item-row:last-child { border: none; }
        
        .driver-arrival-badge { background: rgba(59, 130, 246, 0.15); color: #60a5fa; padding: 6px 12px; border-radius: 12px; font-size: 10px; font-weight: 900; text-transform: uppercase; border: 1px solid rgba(59, 130, 246, 0.3); animation: fade-in-out 2s infinite; }
        @keyframes fade-in-out { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    </style>
</head>
<body>
    <div id="sync-overlay" class="fixed inset-0 z-[3000] bg-black flex flex-col items-center justify-center text-center p-10">
        <div class="relative">
            <div class="absolute inset-0 bg-purple-500 blur-[60px] opacity-20 animate-pulse"></div>
            <img src="https://raw.githubusercontent.com/aamirinslovenia-sudo/jejmo/main/logo.jpg?t=20260329" class="logo-large mb-10 relative z-10">
        </div>
        <button onclick="startKitchen()" class="px-16 py-7 bg-blue-600 rounded-[30px] text-white font-[900] text-xl shadow-2xl uppercase tracking-widest active:scale-95 transition-all relative z-10">Vstopi v Kuhinjo</button>
    </div>

    <nav class="top-nav">
        <div class="flex items-center gap-8">
            <img src="https://raw.githubusercontent.com/aamirinslovenia-sudo/jejmo/main/logo.jpg?t=20260329" class="logo-small">
            <div id="driver-summary" class="flex gap-3 border-l border-white/10 pl-8"></div>
        </div>
        <div class="flex items-center gap-8">
            <div class="bg-white/5 px-6 py-3 rounded-2xl border border-white/5 text-center">
                <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Avg Prep</p>
                <p id="avg-prep" class="text-lg font-black text-blue-400">--m</p>
            </div>
            <p id="clock" class="text-4xl font-black tabular-nums leading-none tracking-tighter">00:00:00</p>
            <button onclick="toggleHistory()" class="bg-blue-600/10 border border-blue-500/20 text-blue-400 px-8 py-4 rounded-2xl text-[11px] font-[900] uppercase tracking-widest hover:bg-blue-600 hover:text-white transition-all">Dnevnik</button>
        </div>
    </nav>

    <div id="orderList" class="matrix-container"></div>

    <div id="history-sidebar">
        <div class="p-10 border-b border-white/5 flex justify-between items-center">
            <h2 class="text-2xl font-black italic uppercase text-blue-500">Zgodovina</h2>
            <button onclick="toggleHistory()" class="text-slate-500 hover:text-white text-3xl">✕</button>
        </div>
        <div id="historyList" class="flex-1 overflow-y-auto px-8 py-4"></div>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyBD_YmzFTA2OKn64h22Z9yM7pCAmmlTl68", 
            authDomain: "jejmo-maribor.firebaseapp.com", 
            databaseURL: "https://jejmo-maribor-default-rtdb.europe-west1.firebasedatabase.app", 
            projectId: "jejmo-maribor", 
            storageBucket: "jejmo-maribor.firebasestorage.app", 
            messagingSenderId: "87105321281", 
            appId: "1:87105321281:web:ec83e4472e5756182749c0" 
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let audioCtx = null; let alarmInterval = null;

        setInterval(() => { 
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('sl-SI'); 
            updateTimers(); 
        }, 1000);

        function startKitchen() { 
            audioCtx = new (window.AudioContext || window.webkitAudioContext)(); 
            document.getElementById('sync-overlay').style.display = "none"; 
        }

        function playBell() { 
            if (!audioCtx) return; 
            const t = audioCtx.currentTime; 
            [880, 1100, 1320].forEach((f, i) => { // High clear arpeggio
                const o = audioCtx.createOscillator(); 
                const g = audioCtx.createGain(); 
                o.connect(g); g.connect(audioCtx.destination); 
                o.frequency.setValueAtTime(f, t + (i * 0.12)); 
                g.gain.setValueAtTime(0.08, t + (i * 0.12)); 
                g.gain.exponentialRampToValueAtTime(0.001, t + (i * 0.12) + 0.6); 
                o.start(t + (i * 0.12)); o.stop(t + (i * 0.12) + 0.6); 
            }); 
        }

        function playTick() {
            if (!audioCtx) return;
            const t = audioCtx.currentTime;
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            o.frequency.setValueAtTime(1200, t);
            g.gain.setValueAtTime(0.05, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
            o.start(t); o.stop(t + 0.1);
        }

        function toggleHistory() { document.getElementById('history-sidebar').classList.toggle('sidebar-open'); }

        db.ref('orders').on('value', (snap) => {
            const list = document.getElementById('orderList');
            const history = document.getElementById('historyList');
            const driverBox = document.getElementById('driver-summary');
            let drivers = {}; let activeOrders = []; let prepTimes = [];
            history.innerHTML = ""; list.innerHTML = "";

            snap.forEach((child) => {
                const o = child.val(); o.id = child.key;
                if(o.claimedBy) {
                    drivers[o.claimedBy] = (o.status === "Delivering") ? "Busy" : "Waiting";
                }
                if (o.status === "New" || o.status === "Preparing") { 
                    activeOrders.push(o); 
                } else { 
                    renderHistory(o.id, o); 
                    if(o.kitchenFinishedAt && o.timestamp) prepTimes.push((o.kitchenFinishedAt - o.timestamp) / 60000); 
                }
            });

            activeOrders.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
            activeOrders.forEach(order => renderOrder(order.id, order));
            
            if(prepTimes.length > 0) document.getElementById('avg-prep').innerText = Math.round(prepTimes.reduce((a,b) => a+b, 0) / prepTimes.length) + "m";
            
            driverBox.innerHTML = Object.keys(drivers).map(dId => `<div class="driver-status-pill"><span class="dot ${drivers[dId] === "Busy" ? 'dot-red' : 'dot-green'}"></span>${dId}</div>`).join('') || '<span class="text-[9px] text-slate-700 font-black uppercase tracking-widest text-left">Ni aktivnih kurirjev</span>';
            
            if (activeOrders.some(o => o.status === "New") && !alarmInterval) {
                alarmInterval = setInterval(playBell, 6000);
                playBell();
            } else if (!activeOrders.some(o => o.status === "New")) {
                clearInterval(alarmInterval); alarmInterval = null;
            }
        });

        function renderOrder(id, o) {
            const time = o.timestamp || Date.now();
            const isChimney = o.restaurant && o.restaurant.includes("Chimney");
            const brandClass = isChimney ? "brand-chimney" : "brand-default";
            const icon = isChimney ? '🥨' : '🍽️';
            
            const isPreparing = o.status === "Preparing";
            const btnClass = isPreparing ? "btn-ready" : "";
            const btnLabel = isPreparing ? "Naročilo Pripravljeno" : "Sprejmi Naročilo";
            const nextStatus = isPreparing ? "Ready" : "Preparing";
            const displayOrderNum = o.orderNumber ? "#" + o.orderNumber : id.substring(0,5).toUpperCase();
            
            const formattedItems = o.item.split(', ').map(i => `<div class="item-row">${i}</div>`).join('');

            // Enhanced Driver Logic
            let driverInfo = `<span class="text-[10px] text-slate-500 font-black uppercase tracking-widest">Iskanje flote...</span>`;
            if(o.claimedBy) {
                const arrival = o.driverEta ? `${o.driverEta} MIN` : 'NA POTI';
                driverTag = `<div class="driver-arrival-badge">Dostavljalec ${o.claimedBy} • ${arrival}</div>`;
                driverInfo = driverTag;
            }

            const html = `
                <div id="card-${id}" data-time="${time}" class="order-card ${brandClass}">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-4xl font-[900] text-white italic tracking-tighter">${displayOrderNum}</span>
                        <span class="text-xl font-black italic bg-white/5 px-4 py-2 rounded-2xl">${o.totalPrice}</span>
                    </div>
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">${o.restaurant || 'MARIBOR'}</span>
                        ${driverInfo}
                    </div>
                    <div class="mb-4">
                        <h2 class="text-2xl font-black uppercase italic tracking-tighter leading-tight flex items-start gap-3">
                            <span class="mt-1">${icon}</span> 
                            <div class="flex-1">${formattedItems}</div>
                        </h2>
                    </div>
                    <div class="bg-white/[0.03] p-5 rounded-2xl border border-white/5 mb-6">
                        <p class="text-[8px] font-black text-slate-600 uppercase mb-2">Navodila</p>
                        <p class="text-sm italic text-slate-300 leading-tight">${o.courierInstruction || 'Brez posebnih navodil.'}</p>
                    </div>
                    <div class="flex justify-between items-end">
                        <div>
                            <p class="text-[8px] font-black text-slate-600 uppercase mb-1">Kitchen Timer</p>
                            <p id="timer-${id}" class="text-3xl font-black tabular-nums tracking-tighter">00:00</p>
                        </div>
                        <div class="text-right">
                            <p class="text-xs font-black uppercase text-blue-400 mb-1">${o.customer}</p>
                            <p class="text-[9px] font-bold text-slate-500">${o.paymentType || 'Gotovina'}</p>
                        </div>
                    </div>
                    <button onclick="setStatus('${id}', '${nextStatus}')" class="btn-dispatch ${btnClass}">${btnLabel}</button>
                </div>`;
            document.getElementById('orderList').insertAdjacentHTML('beforeend', html);
        }

        function setStatus(id, s) { 
            playTick();
            const updates = { status: s };
            if (s === 'Ready') updates.kitchenFinishedAt = Date.now();
            db.ref('orders/' + id).update(updates); 
        }

        function reOpenOrder(id) {
            playTick();
            db.ref('orders/' + id).update({ status: 'Preparing', kitchenFinishedAt: null });
        }

        function updateTimers() { 
            document.querySelectorAll('[id^="card-"]').forEach(card => { 
                const id = card.id.replace('card-', ''); 
                const elapsed = Math.floor((Date.now() - parseInt(card.getAttribute('data-time'))) / 1000); 
                const timerEl = document.getElementById(`timer-${id}`); 
                if(timerEl) timerEl.innerText = `${Math.floor(elapsed / 60).toString().padStart(2, '0')}:${(elapsed % 60).toString().padStart(2, '0')}`; 
                
                if (elapsed > 1500) card.classList.add('card-urgent'); 
                else if (elapsed > 900) card.classList.add('card-warning'); 
            }); 
        }

        function renderHistory(id, o) { 
            const displayOrderNum = o.orderNumber ? "#" + o.orderNumber : id.substring(0,5).toUpperCase();
            const html = `
                <div class="bg-white/5 p-6 rounded-[28px] border border-white/5 mb-4 group">
                    <div class="flex justify-between items-center mb-3">
                        <p class="font-black italic uppercase text-white">${displayOrderNum}</p>
                        <p class="text-blue-400 font-bold">${o.totalPrice}</p>
                    </div>
                    <p class="text-xs text-slate-500 font-bold uppercase mb-4">${o.customer} • ${o.item.substring(0,30)}...</p>
                    <button onclick="reOpenOrder('${id}')" class="w-full py-3 bg-white/5 hover:bg-white/10 rounded-xl text-[9px] font-black uppercase tracking-widest transition-all">Ponovno Odpri</button>
                </div>`; 
            document.getElementById('historyList').insertAdjacentHTML('afterbegin', html); 
        }
    </script>
</body>
</html>
