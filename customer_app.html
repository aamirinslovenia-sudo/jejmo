<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JEJMO | Premium Dostava</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script> 
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --brand: #a855f7; }
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: #060a11; 
            color: white; 
            overflow-x: hidden; 
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
        }

        /* GPU Acceleration for iPhone 15 Pro */
        .smooth-gpu { transform: translate3d(0,0,0); backface-visibility: hidden; will-change: transform; }

        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        
        .logo-container { position: relative; display: flex; justify-content: center; align-items: center; width: 140px; height: 140px; margin: 0 auto; }
        .logo-glow { position: absolute; width: 140px; height: 140px; background: radial-gradient(circle, rgba(168, 85, 247, 0.4) 0%, rgba(168, 85, 247, 0) 70%); filter: blur(20px); z-index: 0; }
        .logo-main { width: 120px; height: 120px; border-radius: 50%; border: 2px solid rgba(255, 255, 255, 0.15); z-index: 1; position: relative; transform: translate3d(0,0,0); }
        .logo-header { height: 52px; width: 52px; border-radius: 50%; border: 1px solid rgba(255, 255, 255, 0.2); transform: translate3d(0,0,0); }
        
        #onboarding-screen { position: fixed; inset: 0; background: #060a11; z-index: 5000; display: flex; flex-direction: column; justify-content: center; padding: 40px; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        .input-box { width: 100%; background: rgba(255,255,255,0.05); border-radius: 20px; padding: 20px 24px; border: 1px solid rgba(255,255,255,0.1); outline: none; color: white; font-weight: 600; }
        .active-item { border-color: var(--brand) !important; background: rgba(168, 85, 247, 0.15) !important; transform: scale(1.02); }
        
        #order-tracking-overlay { position: fixed; inset: 0; background: #060a11; z-index: 2000; display: none; flex-direction: column; }
        .tracking-dot { width: 12px; height: 12px; border-radius: 50%; background: #1e293b; transition: all 0.4s ease; will-change: transform, background; }
        .tracking-dot.active { background: var(--brand); box-shadow: 0 0 15px var(--brand); transform: scale(1.2); }
        
        #live-map { flex-grow: 1; width: 100%; background: #080c14; border-top: 1px solid rgba(255,255,255,0.05); }
        .cart-item-chip { background: rgba(168, 85, 247, 0.1); border: 1px solid rgba(168, 85, 247, 0.3); padding: 4px 12px; border-radius: 10px; font-size: 10px; font-weight: 700; color: #d8b4fe; margin: 0 5px 5px 0; display: inline-block; }
        .product-img { width: 100%; height: 110px; object-fit: cover; border-radius: 18px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .lang-btn { font-size: 10px; font-weight: 900; padding: 6px 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); color: #475569; }
        .lang-btn.active { color: white; background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); }
    </style>
</head>
<body class="pb-24">

    <div id="onboarding-screen" class="smooth-gpu">
        <div class="mb-12 text-center flex flex-col items-center">
            <div class="logo-container mb-8">
                <div class="logo-glow"></div>
                <img src="https://raw.githubusercontent.com/aamirinslovenia-sudo/jejmo/main/logo.jpg" alt="Logo" class="logo-main">
            </div>
            <p data-t="onboarding_sub" class="text-slate-400 font-bold tracking-tight text-center leading-relaxed">Vrhunska dostava <br>do vaših vrat.</p>
        </div>
        <div id="setup-fields" class="space-y-3 mb-8 hidden">
            <input id="userName" type="text" placeholder="Polno ime" class="input-box">
            <input id="userEmail" type="email" placeholder="E-pošta" class="input-box">
            <input id="userPhone" type="tel" placeholder="Telefon" class="input-box">
            <input id="userAddress" type="text" placeholder="Naslov v Mariboru" class="input-box">
        </div>
        <button id="gate-btn" onclick="handleGateway()" class="bg-white text-black font-black py-6 rounded-[30px] text-lg uppercase tracking-widest active:scale-95 transition-all">Nadaljuj</button>
    </div>

    <header class="flex flex-col items-center pt-8 pb-6 border-b border-white/5 mb-8 px-6 relative smooth-gpu">
        <div class="absolute right-6 top-8 flex gap-1">
            <button onclick="setLanguage('slo')" id="btn-slo" class="lang-btn active">SLO</button>
            <button onclick="setLanguage('eng')" id="btn-eng" class="lang-btn">ENG</button>
        </div>
        <img src="https://raw.githubusercontent.com/aamirinslovenia-sudo/jejmo/main/logo.jpg" alt="Logo" class="logo-header mb-4">
        <div class="flex items-center gap-2 glass px-4 py-1.5 rounded-full">
            <span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span>
            <p id="header-addr" class="text-[9px] font-black text-slate-400 uppercase tracking-widest italic">NALAGANJE...</p>
        </div>
    </header>

    <div id="restaurant-view" class="max-w-md mx-auto px-6 space-y-4 smooth-gpu">
        <div onclick="selectRestaurant('Chimney Cake MB')" class="glass p-5 rounded-[32px] flex items-center gap-5 border border-white/5 active:scale-95 transition-all">
            <img src="https://raw.githubusercontent.com/aamirinslovenia-sudo/jejmo/main/chimney.jpg" class="w-20 h-20 rounded-2xl object-cover">
            <div>
                <h3 class="font-black text-lg leading-none mb-1 uppercase italic">Chimney Cake MB</h3>
                <p data-t="rest_sub" class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Sveže pečeno • 25 min</p>
            </div>
        </div>
    </div>

    <div id="menu-view" class="max-w-md mx-auto px-6 space-y-8 hidden smooth-gpu">
        <button onclick="goBack()" class="text-[10px] font-black text-purple-400 uppercase tracking-widest mb-4">← Nazaj</button>
        <div class="grid grid-cols-2 gap-4">
            <div id="item-C1" onclick="addToCart('Chimney Style A', 8.50, 'item-C1')" class="glass p-4 rounded-[28px] text-center border border-white/5 transition-all">
                <img src="https://raw.githubusercontent.com/aamirinslovenia-sudo/jejmo/refs/heads/main/PD1.JPG.jpeg" class="product-img">
                <p class="font-bold text-[10px] uppercase mb-1">Style A</p>
                <p class="text-purple-400 font-black text-xs">€8.50</p>
            </div>
            <div id="item-C2" onclick="addToCart('Chimney Style B', 7.90, 'item-C2')" class="glass p-4 rounded-[28px] text-center border border-white/5 transition-all">
                <img src="https://raw.githubusercontent.com/aamirinslovenia-sudo/jejmo/refs/heads/main/PD2.JPG.jpeg" class="product-img">
                <p class="font-bold text-[10px] uppercase mb-1">Style B</p>
                <p class="text-purple-400 font-black text-xs">€7.90</p>
            </div>
        </div>

        <div class="space-y-6">
            <textarea id="courier-note" class="input-box text-sm h-24" placeholder="Navodila za kurirja..."></textarea>
            <div class="flex gap-3">
                <button id="pay-Cash" onclick="setPayment('Cash')" class="flex-1 py-4 glass rounded-2xl text-[11px] font-black uppercase">💵 Gotovina</button>
                <button id="pay-Card" onclick="setPayment('Card')" class="flex-1 py-4 glass rounded-2xl text-[11px] font-black uppercase">💳 Kartica</button>
            </div>
            <div id="cart-summary" class="hidden"><div id="cart-items-container" class="flex flex-wrap"></div></div>
            <div class="flex justify-between items-center px-2">
                <div>
                    <p class="text-[10px] font-black uppercase text-slate-500 italic">Skupaj</p>
                    <h3 id="priceDisplay" class="text-5xl font-black italic tracking-tighter">€0.00</h3>
                </div>
                <button onclick="resetUser()" class="text-[9px] font-bold text-slate-600 uppercase underline">Odjava</button>
            </div>
            <button id="orderBtn" onclick="sendOrder()" class="w-full bg-purple-600 text-white font-black py-7 rounded-[32px] text-xl shadow-2xl active:scale-95 transition-all uppercase italic">Izberite izdelke</button>
        </div>
    </div>

    <div id="order-tracking-overlay" class="smooth-gpu">
        <div class="flex justify-between items-start px-8 pt-12 mb-4">
            <img src="https://raw.githubusercontent.com/aamirinslovenia-sudo/jejmo/main/logo.jpg" class="logo-header">
            <div class="text-right">
                <div class="flex gap-3 mb-2 justify-end">
                    <div id="step-new" class="tracking-dot"></div>
                    <div id="step-kitchen" class="tracking-dot"></div>
                    <div id="step-delivery" class="tracking-dot"></div>
                </div>
                <p id="tracking-status-text" class="text-[10px] font-black text-purple-400 uppercase tracking-widest italic">NAROČILO ODDANO</p>
            </div>
        </div>
        <div id="live-map"></div>
        <div class="p-8 glass rounded-t-[40px] mt-[-40px] z-50">
            <div id="courier-badge" class="hidden glass p-4 rounded-2xl flex items-center gap-4 mb-6 border-purple-500/30">
                <div class="w-10 h-10 bg-purple-600 rounded-full flex items-center justify-center text-lg">🛵</div>
                <div class="flex-1"><p class="text-[9px] font-black text-slate-500 uppercase">Kurir</p><p id="courier-name-display" class="font-black italic uppercase">---</p></div>
                <a id="courier-call-btn" href="tel:" class="w-10 h-10 glass rounded-xl flex items-center justify-center text-purple-400">📞</a>
            </div>
            <div class="flex justify-between items-end">
                <div><p class="text-[10px] text-slate-500 uppercase font-black italic">Prihod</p><h3 id="eta-display" class="text-4xl font-black italic tracking-tighter">~25 MIN</h3></div>
                <button onclick="location.reload()" class="bg-white/5 px-6 py-3 rounded-xl text-[9px] font-black uppercase">Trgovina</button>
            </div>
        </div>
    </div>

    <div id="success-msg" class="smooth-gpu">
        <div class="logo-container mb-12"><div class="logo-glow"></div><img src="https://raw.githubusercontent.com/aamirinslovenia-sudo/jejmo/main/logo.jpg" class="logo-main"></div>
        <h2 class="text-4xl font-black italic tracking-tighter mb-2 uppercase">MISIJA USPELA</h2>
        <p class="text-slate-400 font-bold mb-10">Potrdilo je na vaši e-pošti.</p>
        <button onclick="location.reload()" class="bg-white text-black font-black px-12 py-5 rounded-full uppercase tracking-widest">Nazaj</button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBD_YmzFTA2OKn64h22Z9yM7pCAmmlTl68", authDomain: "jejmo-maribor.firebaseapp.com", databaseURL: "https://jejmo-maribor-default-rtdb.europe-west1.firebasedatabase.app", projectId: "jejmo-maribor", storageBucket: "jejmo-maribor.firebasestorage.app", messagingSenderId: "87105321281", appId: "1:87105321281:web:ec83e4472e5756182749c0" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database(); const fs = firebase.firestore(); const auth = firebase.auth();

        let selectedRestaurant = ""; let cart = []; let selectedPayment = ""; let map = null; let courierMarker = null;

        window.onload = () => {
            if (localStorage.getItem('kleo_name')) { 
                document.getElementById('onboarding-screen').style.display = 'none'; 
                document.getElementById('header-addr').innerText = localStorage.getItem('kleo_address');
            }
        };

        function handleGateway() {
            const fields = ['userName', 'userEmail', 'userPhone', 'userAddress'];
            const data = {};
            let missing = false;
            fields.forEach(f => { 
                data[f] = document.getElementById(f).value.trim();
                if(!data[f]) missing = true;
            });
            if(missing) return document.getElementById('setup-fields').classList.remove('hidden');
            localStorage.setItem('kleo_name', data.userName);
            localStorage.setItem('kleo_email', data.userEmail);
            localStorage.setItem('kleo_phone', data.userPhone);
            localStorage.setItem('kleo_address', data.userAddress);
            document.getElementById('onboarding-screen').style.transform = 'translateY(-100%)';
            document.getElementById('header-addr').innerText = data.userAddress;
        }

        function selectRestaurant(name) { selectedRestaurant = name; document.getElementById('restaurant-view').classList.add('hidden'); document.getElementById('menu-view').classList.remove('hidden'); }
        function goBack() { document.getElementById('restaurant-view').classList.remove('hidden'); document.getElementById('menu-view').classList.add('hidden'); cart = []; updateCartUI(); }

        function addToCart(name, price, id) {
            const index = cart.findIndex(i => i.elementId === id);
            if (index > -1) { cart.splice(index, 1); document.getElementById(id).classList.remove('active-item'); }
            else { cart.push({ name, price, quantity: 1, elementId: id }); document.getElementById(id).classList.add('active-item'); }
            updateCartUI();
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items-container');
            container.innerHTML = ""; let total = 0;
            if(cart.length === 0) {
                document.getElementById('cart-summary').classList.add('hidden');
                document.getElementById('orderBtn').innerText = "Izberite izdelke";
                document.getElementById('priceDisplay').innerText = "€0.00";
                return;
            }
            document.getElementById('cart-summary').classList.remove('hidden');
            document.getElementById('orderBtn').innerText = "ODDAJ NAROČILO";
            cart.forEach(item => {
                total += item.price;
                const chip = document.createElement('span'); chip.className = "cart-item-chip"; chip.innerText = `1x ${item.name}`;
                container.appendChild(chip);
            });
            document.getElementById('priceDisplay').innerText = "€" + total.toFixed(2);
        }

        function setPayment(method) { 
            selectedPayment = method; 
            ['pay-Cash', 'pay-Card'].forEach(id => document.getElementById(id).classList.remove('active-item'));
            document.getElementById('pay-' + method).classList.add('active-item');
        }

        function sendOrder() {
            if (cart.length === 0 || !selectedPayment) return;
            db.ref('globalOrderCounter').transaction(cv => (cv || 0) + 1, (err, comm, snap) => {
                if (comm) {
                    const orderId = db.ref('orders').push().key;
                    db.ref('orders/' + orderId).set({
                        orderNumber: snap.val().toString().padStart(3, '0'),
                        customer: localStorage.getItem('kleo_name'),
                        address: localStorage.getItem('kleo_address'),
                        phone: localStorage.getItem('kleo_phone'),
                        email: localStorage.getItem('kleo_email'),
                        item: cart.map(i => i.name).join(", "),
                        restaurant: selectedRestaurant,
                        totalPrice: document.getElementById('priceDisplay').innerText,
                        paymentType: selectedPayment,
                        courierInstruction: document.getElementById('courier-note').value,
                        timestamp: Date.now(),
                        status: 'New'
                    }).then(() => { startTracking(orderId); });
                }
            });
        }

        function startTracking(orderId) {
            document.getElementById('order-tracking-overlay').style.display = 'flex';
            if(!map) {
                map = L.map('live-map', { zoomControl: false, attributionControl: false }).setView([46.5547, 15.6459], 14);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            }
            db.ref('orders/' + orderId).on('value', (snap) => {
                const o = snap.val(); if(!o) return;
                document.getElementById('step-new').classList.add('active');
                if(["Preparing", "Ready", "Delivering", "Completed"].includes(o.status)) document.getElementById('step-kitchen').classList.add('active');
                if(["Delivering", "Completed"].includes(o.status)) document.getElementById('step-delivery').classList.add('active');
                const statusMap = { New: "ODDANO", Preparing: "PRIPRAVA", Ready: "PRIPRAVLJENO", Delivering: "NA POTI", Completed: "DOSTAVLJENO" };
                document.getElementById('tracking-status-text').innerText = statusMap[o.status] || "ČAKANJE...";
                if(o.claimedByName) { 
                    document.getElementById('courier-badge').classList.remove('hidden'); 
                    document.getElementById('courier-name-display').innerText = o.claimedByName;
                    document.getElementById('courier-call-btn').href = "tel:" + o.courierPhone;
                }
                if(o.courierLocation && o.status === "Delivering") {
                    const pos = [o.courierLocation.lat, o.courierLocation.lng];
                    if(!courierMarker) { 
                        courierMarker = L.marker(pos, {icon: L.divIcon({ html: '<div style="background:#a855f7; width:18px; height:18px; border:3px solid white; border-radius:50%; box-shadow:0 0 15px #a855f7;"></div>', className: '' })}).addTo(map); 
                    } else { courierMarker.setLatLng(pos); }
                    map.panTo(pos);
                }
                if(o.status === "Completed") { document.getElementById('success-msg').style.display = 'flex'; }
            });
        }
        function resetUser() { if(confirm("Logout?")) { localStorage.clear(); location.reload(); } }
    </script>
</body>
</html>
